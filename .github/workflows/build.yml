name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore SubiektBridge.sln

      - name: Build
        run: dotnet build SubiektBridge.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test SubiektBridge.sln --configuration Release --no-build --verbosity normal
