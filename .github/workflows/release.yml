name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # Każdy item generuje 2 ZIPy (self-contained + framework-dependent).
        # Subiekt GT jest wyłącznie 32-bit (cała linia produktów InsERT "GT").
        # In-proc COM wymaga że bit-level Bridge pasuje do Subiekta - dlatego tylko x86.
        # (Subiekt Nexo to osobny produkt, x64, ale nie targetujemy go.)
        rid: [win-x86]
    outputs:
      version: ${{ steps.ver.outputs.version }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Determine version
        id: ver
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Publish self-contained (${{ matrix.rid }})
        run: |
          dotnet publish src/SubiektBridge.Api/SubiektBridge.Api.csproj \
            -c Release -r ${{ matrix.rid }} \
            --self-contained true \
            -p:PublishSingleFile=false -p:DebugType=None -p:DebugSymbols=false \
            -p:Version=${{ steps.ver.outputs.version }} \
            -o publish/${{ matrix.rid }}-selfcontained

      - name: Publish framework-dependent (${{ matrix.rid }})
        run: |
          dotnet publish src/SubiektBridge.Api/SubiektBridge.Api.csproj \
            -c Release -r ${{ matrix.rid }} \
            --self-contained false \
            -p:PublishSingleFile=false -p:DebugType=None -p:DebugSymbols=false \
            -p:Version=${{ steps.ver.outputs.version }} \
            -o publish/${{ matrix.rid }}-fxdep

      - name: Bundle deploy artifacts
        run: |
          cat > /tmp/appsettings.Production.json.template <<'JSON'
          {
            "//token": "Wygeneruj losowy 64+ znaków, ten sam wpisz w marketplace-manage .env jako SUBIEKT_BRIDGE_TOKEN",
            "Logging": { "LogLevel": { "Default": "Information", "Microsoft.AspNetCore": "Warning" } },
            "Kestrel": {
              "Endpoints": {
                "Https": {
                  "Url": "https://0.0.0.0:8443",
                  "Certificate": {
                    "Path": "data/cert.pfx",
                    "Password": "subiekt-bridge-self-signed"
                  }
                }
              }
            },
            "Bridge": {
              "Token": "WSTAW-LOSOWY-64-ZNAKOWY-TOKEN",
              "UseFakeSfera": false,
              "AllowedRawSferaMethods": [],
              "IdempotencyStorePath": "C:\\SubiektBridge\\data\\idempotency.db",
              "IdempotencyTtlDays": 30
            },
            "Subiekt": {
              "Product": 1,
              "Authentication": 0,
              "Server": ".\\SQLEXPRESS",
              "Database": "MAGAZYN",
              "DbUser": "subiekt-user",
              "DbPassword": "WSTAW-HASLO-DO-MSSQL",
              "Operator": "INTEGRACJA",
              "OperatorPassword": "WSTAW-HASLO-OPERATORA-SUBIEKTA",
              "PdfTemplateId": null,
              "Encoding": "windows-1250"
            }
          }
          JSON

          for variant in selfcontained fxdep; do
            dir="publish/${{ matrix.rid }}-${variant}"
            cp deploy/install-windows.ps1 "$dir/"
            cp deploy/update-windows.ps1 "$dir/"
            cp /tmp/appsettings.Production.json.template "$dir/"
            rm -f "$dir/appsettings.Development.json"
          done

          du -sh publish/${{ matrix.rid }}-selfcontained publish/${{ matrix.rid }}-fxdep

      - name: Create ZIPs
        run: |
          VERSION=${{ steps.ver.outputs.version }}
          RID=${{ matrix.rid }}

          (cd publish && mv ${RID}-selfcontained ${RID} && \
            zip -qr "../SubiektBridge-${VERSION}-${RID}.zip" ${RID} && \
            mv ${RID} ${RID}-selfcontained)

          (cd publish && mv ${RID}-fxdep ${RID} && \
            zip -qr "../SubiektBridge-${VERSION}-${RID}-fxdep.zip" ${RID} && \
            mv ${RID} ${RID}-fxdep)

          ls -lh SubiektBridge-${VERSION}-${RID}*.zip

      - name: Compute SHA256
        run: |
          VERSION=${{ steps.ver.outputs.version }}
          RID=${{ matrix.rid }}
          for f in SubiektBridge-${VERSION}-${RID}.zip SubiektBridge-${VERSION}-${RID}-fxdep.zip; do
            sha256sum "$f" > "${f}.sha256"
          done

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.rid }}
          path: |
            SubiektBridge-*.zip
            SubiektBridge-*.zip.sha256
          retention-days: 1

  publish:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: List artifacts
        run: ls -lh dist/

      - name: Determine version
        id: ver
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: SubiektBridge ${{ steps.ver.outputs.version }}
          generate_release_notes: true
          body: |
            ## Pliki do pobrania

            Subiekt GT jest wyłącznie 32-bit (cała linia "GT" InsERT). Bridge to in-process COM
            klient — bit-level musi pasować, dlatego tylko **win-x86**. Działa na 32- i 64-bitowym
            Windowsie (na 64-bit przez WOW64).

            | Plik | Rozmiar | Wymagania |
            |---|---|---|
            | `SubiektBridge-${{ steps.ver.outputs.version }}-win-x86.zip` | ~45 MB | **Nic** — runtime wbudowany (self-contained) |
            | `SubiektBridge-${{ steps.ver.outputs.version }}-win-x86-fxdep.zip` | ~2 MB | **ASP.NET Core Runtime 10 (x86)** zainstalowany |

            Niepewny? Bierz self-contained.

            ASP.NET Core Runtime 10 (x86) dla Windows: https://dotnet.microsoft.com/download/dotnet/10.0
            (przy pobieraniu wybierz "x86" — nie "x64").
          files: |
            dist/SubiektBridge-*.zip
            dist/SubiektBridge-*.zip.sha256
