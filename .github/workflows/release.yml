name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Determine version
        id: ver
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Publish win-x64 (self-contained)
        run: |
          dotnet publish src/SubiektBridge.Api/SubiektBridge.Api.csproj \
            -c Release \
            -r win-x64 \
            --self-contained true \
            -p:PublishSingleFile=false \
            -p:DebugType=None \
            -p:DebugSymbols=false \
            -p:Version=${{ steps.ver.outputs.version }} \
            -o publish/win-x64

      - name: Bundle deploy artifacts
        run: |
          cp deploy/install-windows.ps1 publish/win-x64/
          cp deploy/update-windows.ps1 publish/win-x64/
          # Production config template (clean placeholders, no secrets)
          cat > publish/win-x64/appsettings.Production.json.template <<'JSON'
          {
            "//token": "Wygeneruj losowy 64+ znaków, ten sam wpisz w marketplace-manage .env jako SUBIEKT_BRIDGE_TOKEN",
            "Logging": { "LogLevel": { "Default": "Information", "Microsoft.AspNetCore": "Warning" } },
            "Kestrel": { "Endpoints": { "Https": { "Url": "https://0.0.0.0:8443" } } },
            "Bridge": {
              "Token": "WSTAW-LOSOWY-64-ZNAKOWY-TOKEN",
              "UseFakeSfera": false,
              "AllowedRawSferaMethods": [],
              "IdempotencyStorePath": "C:\\SubiektBridge\\data\\idempotency.db",
              "IdempotencyTtlDays": 30
            },
            "Subiekt": {
              "Product": 1,
              "Authentication": 0,
              "Server": ".\\SQLEXPRESS",
              "Database": "MAGAZYN",
              "DbUser": "subiekt-user",
              "DbPassword": "WSTAW-HASLO-DO-MSSQL",
              "Operator": "INTEGRACJA",
              "OperatorPassword": "WSTAW-HASLO-OPERATORA-SUBIEKTA",
              "PdfTemplateId": null,
              "Encoding": "windows-1250"
            }
          }
          JSON
          # Remove dev-only files from publish
          rm -f publish/win-x64/appsettings.Development.json
          ls -lh publish/win-x64/

      - name: Create ZIP
        run: |
          cd publish
          zip -r ../SubiektBridge-${{ steps.ver.outputs.version }}-win-x64.zip win-x64/

      - name: Compute SHA256
        run: sha256sum SubiektBridge-${{ steps.ver.outputs.version }}-win-x64.zip > SubiektBridge-${{ steps.ver.outputs.version }}-win-x64.zip.sha256

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: SubiektBridge ${{ steps.ver.outputs.version }}
          generate_release_notes: true
          files: |
            SubiektBridge-${{ steps.ver.outputs.version }}-win-x64.zip
            SubiektBridge-${{ steps.ver.outputs.version }}-win-x64.zip.sha256
