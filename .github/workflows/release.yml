name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Determine version
        id: ver
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      # ---------------- Self-contained build (~108 MB rozpakowane) ----------------
      - name: Publish win-x64 self-contained
        run: |
          dotnet publish src/SubiektBridge.Api/SubiektBridge.Api.csproj \
            -c Release \
            -r win-x64 \
            --self-contained true \
            -p:PublishSingleFile=false \
            -p:DebugType=None \
            -p:DebugSymbols=false \
            -p:Version=${{ steps.ver.outputs.version }} \
            -o publish/win-x64-selfcontained

      # ---------------- Framework-dependent build (~3 MB rozpakowane) -------------
      # Wymaga zainstalowanego ASP.NET Core Runtime 10 na hoście Windowsa.
      - name: Publish win-x64 framework-dependent
        run: |
          dotnet publish src/SubiektBridge.Api/SubiektBridge.Api.csproj \
            -c Release \
            -r win-x64 \
            --self-contained false \
            -p:PublishSingleFile=false \
            -p:DebugType=None \
            -p:DebugSymbols=false \
            -p:Version=${{ steps.ver.outputs.version }} \
            -o publish/win-x64-fxdep

      - name: Bundle deploy artifacts (oba warianty)
        run: |
          # Wspólny config template + deployment scripts dla obu wariantów.
          cat > /tmp/appsettings.Production.json.template <<'JSON'
          {
            "//token": "Wygeneruj losowy 64+ znaków, ten sam wpisz w marketplace-manage .env jako SUBIEKT_BRIDGE_TOKEN",
            "Logging": { "LogLevel": { "Default": "Information", "Microsoft.AspNetCore": "Warning" } },
            "Kestrel": { "Endpoints": { "Https": { "Url": "https://0.0.0.0:8443" } } },
            "Bridge": {
              "Token": "WSTAW-LOSOWY-64-ZNAKOWY-TOKEN",
              "UseFakeSfera": false,
              "AllowedRawSferaMethods": [],
              "IdempotencyStorePath": "C:\\SubiektBridge\\data\\idempotency.db",
              "IdempotencyTtlDays": 30
            },
            "Subiekt": {
              "Product": 1,
              "Authentication": 0,
              "Server": ".\\SQLEXPRESS",
              "Database": "MAGAZYN",
              "DbUser": "subiekt-user",
              "DbPassword": "WSTAW-HASLO-DO-MSSQL",
              "Operator": "INTEGRACJA",
              "OperatorPassword": "WSTAW-HASLO-OPERATORA-SUBIEKTA",
              "PdfTemplateId": null,
              "Encoding": "windows-1250"
            }
          }
          JSON

          for variant in selfcontained fxdep; do
            cp deploy/install-windows.ps1 "publish/win-x64-${variant}/"
            cp deploy/update-windows.ps1 "publish/win-x64-${variant}/"
            cp /tmp/appsettings.Production.json.template "publish/win-x64-${variant}/"
            rm -f "publish/win-x64-${variant}/appsettings.Development.json"
          done

          echo "--- self-contained ---"
          du -sh publish/win-x64-selfcontained
          echo "--- framework-dependent ---"
          du -sh publish/win-x64-fxdep

      - name: Create ZIPs
        run: |
          VERSION=${{ steps.ver.outputs.version }}

          (cd publish && mv win-x64-selfcontained win-x64 && \
            zip -qr "../SubiektBridge-${VERSION}-win-x64.zip" win-x64 && \
            mv win-x64 win-x64-selfcontained)

          (cd publish && mv win-x64-fxdep win-x64 && \
            zip -qr "../SubiektBridge-${VERSION}-win-x64-fxdep.zip" win-x64 && \
            mv win-x64 win-x64-fxdep)

          ls -lh SubiektBridge-*.zip

      - name: Compute SHA256
        run: |
          VERSION=${{ steps.ver.outputs.version }}
          for f in SubiektBridge-${VERSION}-win-x64.zip SubiektBridge-${VERSION}-win-x64-fxdep.zip; do
            sha256sum "$f" > "${f}.sha256"
          done

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: SubiektBridge ${{ steps.ver.outputs.version }}
          generate_release_notes: true
          body: |
            ## Pliki do pobrania

            | Plik | Rozmiar | Wymagania |
            |---|---|---|
            | `SubiektBridge-${{ steps.ver.outputs.version }}-win-x64.zip` | ~50 MB | **Nic** — runtime wbudowany (self-contained) |
            | `SubiektBridge-${{ steps.ver.outputs.version }}-win-x64-fxdep.zip` | ~2 MB | **ASP.NET Core Runtime 10** zainstalowany na Windowsie |

            **Który wybrać?**
            - Niepewny? Bierz **self-contained** (większy ale działa wszędzie).
            - Masz już zainstalowany .NET 10 SDK / ASP.NET Core Runtime, chcesz mały update? Bierz **fxdep**.

            ASP.NET Core Runtime 10 dla Windows: https://dotnet.microsoft.com/download/dotnet/10.0 (Hosting Bundle lub ASP.NET Core Runtime).
          files: |
            SubiektBridge-${{ steps.ver.outputs.version }}-win-x64.zip
            SubiektBridge-${{ steps.ver.outputs.version }}-win-x64.zip.sha256
            SubiektBridge-${{ steps.ver.outputs.version }}-win-x64-fxdep.zip
            SubiektBridge-${{ steps.ver.outputs.version }}-win-x64-fxdep.zip.sha256
